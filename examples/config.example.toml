# Example Nyx configuration
#
# Copy this file to:
#   ~/.config/nyx/config.toml
#
# Then adjust the sections you actually want to use.

[models]
default = "codex-cli"
fallback = ["ollama-vision", "ollama-local"]

[[models.providers]]
name = "codex-cli"
type = "subprocess-cli"
binary = "codex"
args = ["exec", "--json", "-"]
image_args = ["--image", "{image_path}"]
timeout_seconds = 60

[[models.providers]]
name = "ollama-local"
type = "ollama"
model = "qwen2.5:7b"
host = "http://localhost:11434"

[[models.providers]]
name = "ollama-vision"
type = "ollama"
model = "gemma3:4b"
host = "http://localhost:11434"
vision_timeout_seconds = 180

#[[models.providers]]
#name = "openai"
#type = "openai"
#model = "gpt-4o"
#api_key_env = "OPENAI_API_KEY"

#[[models.providers]]
#name = "anthropic"
#type = "anthropic"
#model = "claude-sonnet-4-5"
#api_key_env = "ANTHROPIC_API_KEY"

[voice]
enabled = true
whisper_binary = "/path/to/whisper-cli"
whisper_model = "/path/to/ggml-small.bin"

[notes]
notes_dir = "~/notes"
inbox_file = "inbox.md"
projects_dir = "~/notes/projects"
auto_sort = true

[rag]
db_path = "~/.local/share/nyx/rag"
embed_model = "nomic-embed-text"

[sync]
notes_repo_path = "~/notes"
memory_mirror_path = "~/notes/memory.md"
syncthing_config_path = "~/.local/state/syncthing/config.xml"
syncthing_snippet_path = "~/.config/nyx/syncthing-nyx-rag.xml"
syncthing_folder_id = "nyx-rag"

[web]
searxng_url = "http://localhost:8080"
brave_api_key = ""
fallback_timeout_seconds = 3

[git]
use_ssh = true
gh_cli = true

[calendar]
provider = "google"
auth_mode = "auto"
credentials_path = "~/.config/nyx/google_credentials.json"
default_calendar_id = "primary"
calendar_ids = []
include_all_calendars = false

[skills]
disabled = []

[monitors]
poll_interval_seconds = 30

[ui]
overlay_anchor = "top-center"
overlay_monitor = "focused"
launcher_width = 700
launcher_height = 300
panel_width = 1056
panel_height = 720
panel_history_width = 280
panel_chat_width = 690
panel_conversation_ratio = 0.76
font = "monospace 11"
summon_hotkey = "Super+A"
theme_mode = "wallpaper"
wallpaper_path = "/absolute/path/to/your/wallpaper.png"
backdrop_enabled = true
backdrop_blur_radius = 18
backdrop_dim_opacity = 0.58

[ui.history]
backend = "sqlite"

[ui.theme]
text_primary = ""
text_muted = ""
accent_cool = ""
accent_warm = ""
border_primary = ""
border_soft = ""
bg_outer = ""
bg_panel = ""
bg_card = ""
bg_card_alt = ""
shadow_color = ""

[system]
confirm_destructive = true
yolo = false
screenshot_tmp = "/tmp/nyx-screen.png"
